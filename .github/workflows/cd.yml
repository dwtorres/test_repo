name: CD
# Trunk-based: push main -> devtest | tag v* -> prod | dispatch -> qa (all dummy).
on:
  push:
    branches: [main]
    tags:     ['v*']
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy"
        type: choice
        options: [devtest, qa, prod]
      apply:
        description: "Run the (dummy) apply"
        type: boolean
        default: true

permissions:
  id-token: write        # mimics the OIDC shape (harmless in the dummy)
  contents: read

jobs:
  devtest:
    if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'devtest'
    uses: ./.github/workflows/_deploy.yml
    with:
      environment: devtest
      apply: ${{ github.event_name == 'push' || github.event.inputs.apply == 'true' }}

  qa:
    if: github.event.inputs.environment == 'qa'         # promotion via dispatch; qa env gates it
    uses: ./.github/workflows/_deploy.yml
    with:
      environment: qa
      apply: ${{ github.event.inputs.apply == 'true' }}

  prod:
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.environment == 'prod'
    uses: ./.github/workflows/_deploy.yml
    with:
      environment: prod
      git_ref: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '' }}
      apply: ${{ github.event_name == 'push' || github.event.inputs.apply == 'true' }}
